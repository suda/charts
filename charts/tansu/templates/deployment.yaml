apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "tansu.fullname" . }}
  labels:
    {{- include "tansu.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "tansu.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "tansu.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "tansu.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: {{ .Chart.Name }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - "--kafka-cluster-id"
            - "{{ .Values.cluster.id }}"
            - "--kafka-listener-url"
            - "tcp://0.0.0.0:{{ .Values.kafka.port }}/"
            - "--kafka-advertised-listener-url"
            - {{ include "tansu.advertisedListenerUrl" . | quote }}
            {{- if eq .Values.storage.engine "postgres" }}
            - "--storage-engine"
            - {{ include "tansu.postgresUrl" . | quote }}
            {{- else if eq .Values.storage.engine "sqlite" }}
            - "--storage-engine"
            - "sqlite://{{ .Values.storage.sqlite.path }}"
            {{- end }}
            {{- with .Values.extraArgs }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          env:
            - name: RUST_LOG
              value: "info"
            {{- if and (eq .Values.storage.engine "postgres") (not .Values.storage.postgres.url) }}
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  {{- if .Values.storage.postgres.existingSecret }}
                  name: {{ .Values.storage.postgres.existingSecret }}
                  key: {{ .Values.storage.postgres.existingSecretKey }}
                  {{- else }}
                  name: {{ include "tansu.fullname" . }}-postgres
                  key: password
                  {{- end }}
            {{- end }}
            {{- with .Values.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          ports:
            - name: kafka
              containerPort: {{ .Values.kafka.port }}
              protocol: TCP
            {{- if .Values.metrics.enabled }}
            - name: metrics
              containerPort: {{ .Values.metrics.port }}
              protocol: TCP
            {{- end }}
          livenessProbe:
            tcpSocket:
              port: kafka
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            tcpSocket:
              port: kafka
            initialDelaySeconds: 10
            periodSeconds: 5
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          {{- if .Values.persistence.enabled }}
          volumeMounts:
            - name: data
              mountPath: /data
          {{- end }}
      {{- if .Values.persistence.enabled }}
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "tansu.fullname" . }}-data
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
