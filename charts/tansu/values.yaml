# Default values for tansu
# This is a YAML-formatted file.

replicaCount: 1

image:
  repository: ghcr.io/tansu-io/tansu
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

# Tansu cluster configuration
cluster:
  # Unique cluster ID
  id: "tansu-cluster"

# Storage engine configuration
# Tansu supports PostgreSQL for metadata storage
storage:
  # Storage engine type: "postgres" or "memory"
  engine: "postgres"

  # PostgreSQL connection settings (when engine is "postgres")
  postgres:
    # Direct connection string (takes precedence if set)
    # Example: "postgres://user:pass@host:5432/dbname"
    url: ""

    # Or use individual settings
    host: "localhost"
    port: 5432
    database: "tansu"
    username: "tansu"
    password: ""

    # Use existing secret for password
    existingSecret: ""
    existingSecretKey: "password"

# Kafka listener configuration
kafka:
  # Port for Kafka protocol
  port: 9092
  # Advertised listener URL (auto-generated if empty)
  advertisedListenerUrl: ""

# Metrics configuration
metrics:
  enabled: true
  port: 9100

  serviceMonitor:
    enabled: false
    interval: 30s
    labels: {}

service:
  type: ClusterIP
  port: 9092
  metricsPort: 9100

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}

podSecurityContext: {}
  # fsGroup: 2000

securityContext: {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

nodeSelector: {}

tolerations: []

affinity: {}

# Extra environment variables
extraEnv: []
  # - name: RUST_LOG
  #   value: "debug"

# Extra arguments to pass to tansu
extraArgs: []
